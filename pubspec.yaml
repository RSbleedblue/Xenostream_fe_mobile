name: xenostream_fe_mobile
description: XenoStream mobile client for voice enrollment and cloned-voice synthesis.
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.4

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  equatable: ^2.0.7
  flutter_bloc: ^9.0.0
  go_router: ^14.6.2
  provider: ^6.1.2
  record: ^6.2.0
  permission_handler: ^11.3.1
  just_audio: ^0.9.42
  path_provider: ^2.1.5
  path: ^1.9.1
  google_fonts: ^6.2.1
  http: ^1.2.2
  audio_session: ^0.1.25

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_native_splash: ^2.4.4
  flutter_launcher_icons: ^0.14.2

flutter:
  uses-material-design: true
  assets:
    - assets/branding/
    - assets/audio/

# Native splash: canvas p50 to match the home screen; the center mark is
# [brand_mark_splash] (light plate in brand_mark recolored to s800) so the logo
# reads on the same background. Regenerate: python3 tool/generate_brand_mark_splash.py
# then: dart run flutter_native_splash:create
flutter_native_splash:
  color: '#F4F5FF'
  image: assets/branding/brand_mark_splash.png
  android_12:
    color: '#F4F5FF'
    image: assets/branding/brand_mark_splash.png
    icon_background_color: '#F4F5FF'

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/branding/brand_mark.png
  remove_alpha_ios: true
